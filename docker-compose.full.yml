# ==========================================================
# QuizArena - Sistema COMPLETO containerizado (local)
#
# Este compose levanta TODO: las 2 bases de datos, Redis, los 3 microservicios
# y el frontend. Sirve para dos cosas:
#
#  1. VALIDAR la containerización antes de subir a Azure. Si algo falla aquí,
#     también fallaría en la nube (pero aquí es mucho más fácil de depurar).
#  2. PLAN B para la demo: si los créditos de Azure se acaban o la nube falla
#     el día de la sustentación, levantas todo con un solo comando.
#
# Uso:
#   docker compose -f docker-compose.full.yml up --build
#
# Luego abre: http://localhost:3001
#
# IMPORTANTE: los `context` apuntan a las carpetas de tus repos. Ajusta las
# rutas si tu estructura es distinta.
# ==========================================================

services:

  # ---------- Infraestructura ----------
  postgres-identidad:
    image: postgres:16
    environment:
      POSTGRES_DB: identidad_db
      POSTGRES_USER: quizarena
      POSTGRES_PASSWORD: quizarena123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizarena -d identidad_db"]
      interval: 5s
      retries: 10
    volumes:
      - pg_identidad:/var/lib/postgresql/data

  postgres-juego:
    image: postgres:16
    environment:
      POSTGRES_DB: juego_db
      POSTGRES_USER: quizarena
      POSTGRES_PASSWORD: quizarena123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizarena -d juego_db"]
      interval: 5s
      retries: 10
    volumes:
      - pg_juego:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10
    volumes:
      - redis_data:/data

  # ---------- Microservicios ----------
  identidad:
    build:
      context: ../QuizArena-IdentityService   # <-- ajusta la ruta a tu repo
      dockerfile: Dockerfile
    environment:
      PORT: 8082
      DB_URL: jdbc:postgresql://postgres-identidad:5432/identidad_db
      DB_USER: quizarena
      DB_PASSWORD: quizarena123
      JWT_SECRET: ${JWT_SECRET:-clave-secreta-de-desarrollo-larga-y-aleatoria-32-bytes}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
    depends_on:
      postgres-identidad:
        condition: service_healthy

  juego:
    build:
      context: ../QuizArena-GameService       # <-- ajusta la ruta a tu repo
      dockerfile: Dockerfile
    environment:
      PORT: 8081
      SERVICIO_IDENTIDAD_URL: http://identidad:8082
      DB_URL: jdbc:postgresql://postgres-juego:5432/juego_db
      DB_USER: quizarena
      DB_PASSWORD: quizarena123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_SSL: "false"
      CORS_ORIGENES: "*"
      INSTANCIA: nodo-1
      JWT_SECRET: ${JWT_SECRET:-clave-secreta-de-desarrollo-larga-y-aleatoria-32-bytes}
    ports:
      - "8081:8081"      # expuesto: el WebSocket se conecta directo aquí
    depends_on:
      redis:
        condition: service_healthy
      postgres-juego:
        condition: service_healthy
      identidad:
        condition: service_started

  ia:
    build:
      context: ../QuizArena-IAService         # <-- ajusta la ruta a tu repo
      dockerfile: Dockerfile
    environment:
      PORT: 8083
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
    ports:
      - "8083:8083"

  gateway:
    build:
      context: ../QuizArena-ApiGateway        # <-- ajusta la ruta a tu repo
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      SERVICIO_IDENTIDAD_URL: http://identidad:8082
      SERVICIO_JUEGO_URL: http://juego:8081
      SERVICIO_IA_URL: http://ia:8083
      JWT_SECRET: ${JWT_SECRET:-clave-secreta-de-desarrollo-larga-y-aleatoria-32-bytes}
      CORS_ORIGENES: "*"
    ports:
      - "8080:8080"
    depends_on:
      - identidad
      - juego
      - ia

  # ---------- Frontend ----------
  frontend:
    build:
      context: ../QuizArena-Frontend           # <-- ajusta la ruta a tu repo
      dockerfile: Dockerfile
      args:
        # Las URLs se incrustan al COMPILAR. Como el navegador corre fuera de
        # Docker, deben apuntar a localhost (no a los nombres de servicio).
        VITE_API_URL: http://localhost:8080
        VITE_WS_URL: http://localhost:8081/ws-juego
    ports:
      - "3001:80"
    depends_on:
      - gateway

volumes:
  pg_identidad:
  pg_juego:
  redis_data:
